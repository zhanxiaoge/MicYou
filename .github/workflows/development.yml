name: Development Build

on:
  push:
    branches: [ "main", "master", "develop" ]
  pull_request:
    branches: [ "main", "master", "develop" ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Read Version
      id: version
      run: |
        VERSION=$(grep "^project.version=" gradle.properties | cut -d'=' -f2 | tr -d '\r')
        echo "version=$VERSION" >> $GITHUB_OUTPUT
    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build Android Debug
      run: ./gradlew :composeApp:assembleDebug

    - name: Prepare Android Artifact
      run: |
        mkdir -p ci-artifacts
        APK=$(ls composeApp/build/outputs/apk/debug/*.apk | head -n 1)
        cp "$APK" "ci-artifacts/MicYou-Android-${{ steps.version.outputs.version }}.apk"

    - name: Upload Android Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: MicYou-Android-${{ steps.version.outputs.version }}
        path: ci-artifacts/MicYou-Android-${{ steps.version.outputs.version }}.apk

  build-windows:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    - name: Read Version
      id: version
      shell: pwsh
      run: |
        $line = (Select-String -Path gradle.properties -Pattern '^project\.version=').Line
        $version = $line.Split('=')[1].Trim()
        "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Install NSIS
      shell: pwsh
      run: |
        $retryCount = 0
        $maxRetries = 3
        while ($retryCount -lt $maxRetries) {
          try {
            choco install nsis -y --no-progress
            if ($LASTEXITCODE -eq 0) { break }
          } catch {}
          $retryCount++
          if ($retryCount -lt $maxRetries) {
            Write-Host "Chocolatey install failed, retrying in 30 seconds... ($retryCount/$maxRetries)"
            Start-Sleep -Seconds 30
          } else {
            Write-Host "Chocolatey failed after $maxRetries attempts. Trying winget..."
            winget install NSIS.NSIS -e --accept-package-agreements --accept-source-agreements
          }
        }
        # Add NSIS to PATH if it was installed but not detected
        $nsisPath = "C:\Program Files (x86)\NSIS"
        if (Test-Path "$nsisPath\makensis.exe") {
          Write-Host "Adding $nsisPath to PATH"
          $env:Path += ";$nsisPath"
          "PATH=$env:Path" | Out-File -FilePath $env:GITHUB_ENV -Append
        }

    - name: Build Windows Artifacts
      shell: pwsh
      run: |
        ./gradlew :composeApp:packageWindowsZip :composeApp:packageWindowsNsis

    - name: Prepare Windows Artifacts
      shell: pwsh
      run: |
        New-Item -ItemType Directory -Force -Path ci-artifacts | Out-Null
        $version = '${{ steps.version.outputs.version }}'
        $zip = Get-ChildItem -Path composeApp/build/distributions -Filter *.zip | Select-Object -First 1
        if (-not $zip) { throw "No zip found in composeApp/build/distributions" }
        Copy-Item $zip.FullName ("ci-artifacts/MicYou-Win-$version.zip") -Force

        $installer = Get-ChildItem -Path composeApp/build/distributions -Filter *setup-nsis.exe | Select-Object -First 1
        if (-not $installer) { throw "No NSIS installer found in composeApp/build/distributions" }
        Copy-Item $installer.FullName ("ci-artifacts/MicYou-Win-$version-installer.exe") -Force

    - name: Upload Windows Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: MicYou-Win-${{ steps.version.outputs.version }}
        path: |
          ci-artifacts/MicYou-Win-${{ steps.version.outputs.version }}.zip
          ci-artifacts/MicYou-Win-${{ steps.version.outputs.version }}-installer.exe

  build-linux:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Read Version
      id: version
      run: |
        VERSION=$(grep "^project.version=" gradle.properties | cut -d'=' -f2 | tr -d '\r')
        echo "version=$VERSION" >> $GITHUB_OUTPUT
    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
    - name: Build Linux DEB and RPM packages
      run: ./gradlew :composeApp:packageDeb :composeApp:packageRpm
    - name: Prepare Linux Artifacts
      run: |
        mkdir -p ci-artifacts
        # 查找DEB和RPM文件
        DEB_FILE=$(ls composeApp/build/compose/binaries/main/deb/*.deb 2>/dev/null | head -n 1)
        RPM_FILE=$(ls composeApp/build/compose/binaries/main/rpm/*.rpm 2>/dev/null | head -n 1)
        
        if [ -f "$DEB_FILE" ]; then
          cp "$DEB_FILE" "ci-artifacts/MicYou-Linux-${{ steps.version.outputs.version }}.deb"
        else
          echo "DEB package not found, check build output."
          exit 1
        fi
        
        if [ -f "$RPM_FILE" ]; then
          cp "$RPM_FILE" "ci-artifacts/MicYou-Linux-${{ steps.version.outputs.version }}.rpm"
        else
          echo "RPM package not found, check build output."
          exit 1
        fi
    - name: Upload Linux Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: MicYou-Linux-${{ steps.version.outputs.version }}
        path: |
          ci-artifacts/MicYou-Linux-${{ steps.version.outputs.version }}.deb
          ci-artifacts/MicYou-Linux-${{ steps.version.outputs.version }}.rpm

  build-macos:
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v4
    - name: Read Version
      id: version
      run: |
        VERSION=$(grep "^project.version=" gradle.properties | cut -d'=' -f2 | tr -d '\r')
        echo "version=$VERSION" >> $GITHUB_OUTPUT
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        architecture: arm64
        cache: gradle
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
    - name: Build macOS DMG
      run: ./gradlew :composeApp:packageDmg
    - name: Prepare macOS Artifacts
      run: |
        mkdir -p ci-artifacts
        DMG_FILE=$(ls composeApp/build/compose/binaries/main/dmg/*.dmg 2>/dev/null | head -n 1)
        if [ -f "$DMG_FILE" ]; then
          cp "$DMG_FILE" "ci-artifacts/MicYou-macOS-${{ steps.version.outputs.version }}.dmg"
        else
          echo "DMG package not found, check build output."
          exit 1
        fi
    - name: Upload macOS Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: MicYou-macOS-${{ steps.version.outputs.version }}
        path: ci-artifacts/MicYou-macOS-${{ steps.version.outputs.version }}.dmg

  # ----------------- Windows 无 JRE 打包任务 -----------------
  build-windows-no-jre:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    - name: Read Version
      id: version
      shell: pwsh
      run: |
        $line = (Select-String -Path gradle.properties -Pattern '^project\.version=').Line
        $version = $line.Split('=')[1].Trim()
        "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle
    - name: Build Windows No-JRE Package
      shell: pwsh
      run: |
        ./gradlew :composeApp:packageWindowsNoJreZip
    - name: Prepare Windows No-JRE Artifact
      shell: pwsh
      run: |
        New-Item -ItemType Directory -Force -Path ci-artifacts | Out-Null
        $version = '${{ steps.version.outputs.version }}'
        $zip = Get-ChildItem -Path composeApp/build/distributions/no-jre -Filter *.zip | Select-Object -First 1
        if (-not $zip) { throw "No zip found in composeApp/build/distributions/no-jre" }
        Copy-Item $zip.FullName ("ci-artifacts/MicYou-Win-NoJRE-$version.zip") -Force
    - name: Upload Windows No-JRE Artifact
      uses: actions/upload-artifact@v4
      with:
        name: MicYou-Win-NoJRE-${{ steps.version.outputs.version }}
        path: ci-artifacts/MicYou-Win-NoJRE-${{ steps.version.outputs.version }}.zip

  # ----------------- Linux 无 JRE 打包任务 -----------------
  build-linux-no-jre:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Read Version
      id: version
      run: |
        VERSION=$(grep "^project.version=" gradle.properties | cut -d'=' -f2 | tr -d '\r')
        echo "version=$VERSION" >> $GITHUB_OUTPUT
    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
    - name: Build Linux No-JRE Package
      run: ./gradlew :composeApp:packageLinuxNoJreTarGz
    - name: Prepare Linux No-JRE Artifact
      run: |
        mkdir -p ci-artifacts
        # 查找 tar.gz 或 tgz 文件
        TAR_FILE=$(ls composeApp/build/distributions/no-jre/*.tar.gz composeApp/build/distributions/no-jre/*.tgz 2>/dev/null | head -n 1)
        if [ -f "$TAR_FILE" ]; then
          cp "$TAR_FILE" "ci-artifacts/MicYou-Linux-NoJRE-${{ steps.version.outputs.version }}.tar.gz"
        else
          echo "TAR.GZ package not found, check build output."
          ls -la composeApp/build/distributions/no-jre/ 2>/dev/null || echo "Directory not found"
          exit 1
        fi
    - name: Upload Linux No-JRE Artifact
      uses: actions/upload-artifact@v4
      with:
        name: MicYou-Linux-NoJRE-${{ steps.version.outputs.version }}
        path: ci-artifacts/MicYou-Linux-NoJRE-${{ steps.version.outputs.version }}.tar.gz

  # ----------------- macOS 无 JRE 打包任务 -----------------
  build-macos-no-jre:
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v4
    - name: Read Version
      id: version
      run: |
        VERSION=$(grep "^project.version=" gradle.properties | cut -d'=' -f2 | tr -d '\r')
        echo "version=$VERSION" >> $GITHUB_OUTPUT
    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
    - name: Build macOS No-JRE Package
      run: ./gradlew :composeApp:packageMacosNoJreTarGz
    - name: Prepare macOS No-JRE Artifact
      run: |
        mkdir -p ci-artifacts
        # 查找 tar.gz 或 tgz 文件
        TAR_FILE=$(ls composeApp/build/distributions/no-jre/*.tar.gz composeApp/build/distributions/no-jre/*.tgz 2>/dev/null | head -n 1)
        if [ -f "$TAR_FILE" ]; then
          cp "$TAR_FILE" "ci-artifacts/MicYou-macOS-NoJRE-${{ steps.version.outputs.version }}.tar.gz"
        else
          echo "TAR.GZ package not found, check build output."
          ls -la composeApp/build/distributions/no-jre/ 2>/dev/null || echo "Directory not found"
          exit 1
        fi
    - name: Upload macOS No-JRE Artifact
      uses: actions/upload-artifact@v4
      with:
        name: MicYou-macOS-NoJRE-${{ steps.version.outputs.version }}
        path: ci-artifacts/MicYou-macOS-NoJRE-${{ steps.version.outputs.version }}.tar.gz
